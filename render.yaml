# render.yaml
# ===========
# Declarative deploy config for Render. Render reads this file when you
# connect the GitHub repo and creates the service described below.
#
# Two-service architecture
# ------------------------
#   wired4signs-app  (web service, srv-d7pm50pj2pic73bsfab0)
#     Hosts the Streamlit dashboard + sync loop (start.sh).
#     Has a 5 GB persistent disk at /data.
#
#   cin7-sync-slack-bot  (background worker, srv-d7u8vpd0lvsc73er0mvg)
#     Runs slack_loop.sh: Slack AI bot + CIN7 write-backs + dropship
#     tracking. No disk — reads shared Postgres DB.
#
# Shared env group
# ----------------
# Most env vars live in Render env group "cin7-shared"
# (ID: evg-d887agnavr4c73e2v1ug).  Both services draw from this group.
# To link the group to a service: Render Dashboard → Service →
#   Environment → "Link environment group" → cin7-shared.
#
# The app service additionally sets these Streamlit/sync vars not in
# the shared group:
#   STREAMLIT_SERVER_HEADLESS, STREAMLIT_HOME,
#   SYNC_HOUR_UTC, NEARSYNC_INTERVAL_MIN,
#   QBO_CASHFLOW_INTERVAL_HOURS, QBO_CASHFLOW_BOOT_DELAY_MIN,
#   WARM_ENGINE_BOOT_DELAY_MIN, WARM_ENGINE_MIN_AVAILABLE_MB
#
# Render disks can't be shared across services — each disk attaches to
# exactly one service. The app service owns /data; the worker reads
# shared state via the Postgres DATABASE_URL.
#
# Streamlit must be the foreground process so Render's health check
# can reach it on $PORT.
#
# What's on the persistent disk at /data:
#   - /data/team_actions.db   (SQLite — migrations, PO drafts, supplier
#                              configs, pricing — source of truth)
#   - /data/output/           (CSVs from CIN7 sync; the app reads these)
#   - /data/.streamlit/cache/ (disk-persisted ABC engine + CSV caches)
#
# Secrets (CIN7 keys, IP token, app password) are NOT in this file.
# They live in Render's encrypted env-var UI / cin7-shared group.
#
# Custom domain: free `<service>.onrender.com` subdomain by default;
# add a custom domain via Settings UI after first deploy works.

services:
  - type: web
    name: cin7-query-api
    runtime: python
    plan: starter           # Minimal plan — just serves API requests.
    region: ohio
    branch: main
    autoDeploy: false
    rootDir: .
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python3 api_query.py
    healthCheckPath: /api/health
    envVars:
      - key: TZ
        value: America/New_York
      - key: QUERY_API_PORT
        value: "8502"
      - key: QUERY_API_KEY
        sync: false         # Set in Render UI — keep secret
    envVarGroups:
      - cin7-shared         # Pulls DATABASE_URL from shared group

  - type: web
    name: wired4signs-app
    runtime: python
    plan: pro               # 4GB RAM — needed for Streamlit + sync loop.
    region: ohio            # Closest to Florida; change if you prefer.
    branch: main            # Deploy from main on push.
    autoDeploy: false       # Stage pushes in GitHub; deploy manually/off-hours to avoid user-facing 502s.
    rootDir: .
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: ./start.sh
    healthCheckPath: /_stcore/health
    disk:
      name: w4s-data
      mountPath: /data
      sizeGB: 5
    envVars:
      # Where data lives — must match the disk mountPath above.
      - key: DATA_DIR
        value: /data
      # Display timestamps in this timezone everywhere in the app
      # (Last-sync indicator, audit log, "Today" / MTD slices etc).
      # Render servers run UTC by default; set this to your business
      # timezone so wall-clock times line up.
      - key: TZ
        value: America/New_York
      # Streamlit prefs: bind to Render's $PORT in headless mode.
      # CORS + XSRF use the Streamlit defaults (both true) — disabling
      # CORS while keeping XSRF on is incompatible and produces a noisy
      # warning, so we just take the defaults.
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
      # Persisted-cache home on the disk so caches survive restarts.
      - key: STREAMLIT_HOME
        value: /data/.streamlit
      # Sync loop schedule.
      # SYNC_HOUR_UTC      — hour of day (UTC) to run the heavy daily
      #                      sync. Once per 24h.
      # NEARSYNC_INTERVAL_MIN — how often to run the lightweight near-
      #                      real-time sync (stock + last-day sales).
      #                      Critical for Ordering page accuracy during
      #                      business hours. Default 15 min.
      # QBO_CASHFLOW_INTERVAL_HOURS — how often to refresh supplier
      #                      bills/open balances from QuickBooks Online
      #                      for Cashflow. Default 4h.
      # QBO_CASHFLOW_BOOT_DELAY_MIN — delay the first automatic QBO
      #                      cashflow refresh after deploy so it does
      #                      not compete with Streamlit startup.
      # QBO_CASHFLOW_MONTHS_BACK — recent bill-detail window. The sync
      #                      always pulls the full open-bills list too,
      #                      so old paid bills still close locally.
      # WARM_ENGINE_BOOT_DELAY_MIN — delay ABC cache warm after boot
      #                      catch-up so it does not compete with
      #                      Streamlit startup.
      # WARM_ENGINE_MIN_AVAILABLE_MB — warm_engine.py skips if Linux
      #                      MemAvailable is below this threshold. Keep
      #                      conservative: the web process and warm engine
      #                      share the same 4GB Render instance.
      - key: SYNC_HOUR_UTC
        value: "2"
      - key: NEARSYNC_INTERVAL_MIN
        value: "15"
      - key: QBO_CASHFLOW_INTERVAL_HOURS
        value: "4"
      - key: QBO_CASHFLOW_BOOT_DELAY_MIN
        value: "30"
      - key: QBO_CASHFLOW_MONTHS_BACK
        value: "6"
      - key: WARM_ENGINE_BOOT_DELAY_MIN
        value: "30"
      - key: WARM_ENGINE_TIMEOUT_SECONDS
        value: "1200"
      - key: WARM_ENGINE_MIN_AVAILABLE_MB
        value: "2500"
      # ---- Secrets (set in Render UI, not here) -----------------------
      - key: APP_PASSWORD
        sync: false        # Team's shared login password.
      - key: CIN7_ACCOUNT_ID
        sync: false
      - key: CIN7_APPLICATION_KEY
        sync: false
      # API throttle. CIN7's 60/min cap is SHARED across all integrations
      # on the account (IP, Shopify, etc). At 1.5s/call (40/min target)
      # we tripped 429s frequently because IP+Shopify ate the rest of
      # the budget — and each 429 costs a 60s sleep, killing throughput.
      # 2.5s/call (24/min target) avoids the cap entirely. Slower per
      # call, FASTER end-to-end. Bump back to 1.5s only if you confirm
      # other integrations are quiet (e.g. weekend overnight syncs).
      - key: CIN7_RATE_SECONDS
        value: "2.5"
      - key: CIN7_DEFAULT_LOCATION
        value: "Main Warehouse"   # Override if your CIN7 location is named differently.
      # Branding (env-driven so the app can be re-skinned without code changes).
      - key: COMPANY_NAME
        value: "Wired4Signs USA"
      - key: APP_TITLE
        value: "Cin7 Analytics — Wired4Signs"
      - key: IP_API_KEY
        sync: false        # Inventory Planner token.
      - key: IP_ACCOUNT
        sync: false        # IP account number.
      # Anthropic Claude API key for the AI Assistant page. Without
      # this set, the AI Assistant page shows a "key not configured"
      # message but the rest of the app keeps working.
      - key: ANTHROPIC_API_KEY
        sync: false
      # Shopify Admin API token + store domain. Used by shopify_sync.py
      # nightly to populate /data/shopify/ which feeds the AI knowledge
      # base. Without these, shopify_sync.py is silently skipped in
      # daily_sync.sh and the KB just doesn't have Shopify content.
      - key: SHOPIFY_DOMAIN
        sync: false       # e.g. wired4signs.myshopify.com
      - key: SHOPIFY_ACCESS_TOKEN
        sync: false       # shpat_... from a custom app
      # Dropship UPS tracking — channel where Slack Email app forwards
      # UPS shipment notifications so the bot can parse and write to CIN7.
      - key: SLACK_DROPSHIP_TRACKING_CHANNEL_ID
        value: "C0B3KD6GBM3"
      # Monthly Metrics executive-summary PDF — "management chat"
      # channel it gets posted to (monthly_metrics_report.py, fired
      # from sync_loop.sh on the 10th of each month).
      - key: SLACK_MONTHLY_REPORT_CHANNEL_ID
        value: "C08KKUQMGDA"
      # SLACK_BOT_TOKEN itself is expected via the cin7-shared env
      # group (used by cin7-sync-slack-bot too) — verify it's actually
      # linked to THIS service as well; monthly_metrics_report.py runs
      # here, in sync_loop.sh, not in the slack worker.
