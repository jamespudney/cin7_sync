# render.yaml
# ===========
# Declarative deploy config for Render. Render reads this file when you
# connect the GitHub repo and creates the service described below.
#
# Single-service architecture
# ---------------------------
# Render disks can't be shared across services — each disk attaches to
# exactly one service. So we run BOTH the Streamlit app AND the daily
# sync loop inside one web service:
#
#   start.sh:
#     1. starts sync_loop.sh as a background process (handles the daily
#        02:00 UTC sync — sleeps until the target hour, runs sync, repeat)
#     2. starts Streamlit in the foreground
#
# Streamlit must be the foreground process so Render's health check
# can reach it on $PORT.
#
# What's on the persistent disk at /data:
#   - /data/team_actions.db   (SQLite — migrations, PO drafts, supplier
#                              configs, pricing — source of truth)
#   - /data/output/           (CSVs from CIN7 sync; the app reads these)
#   - /data/.streamlit/cache/ (disk-persisted ABC engine + CSV caches)
#
# Secrets (CIN7 keys, IP token, app password) are NOT in this file.
# They live in Render's encrypted env-var UI. Keys with `sync: false`
# tell Render "don't sync from repo — prompt the operator on apply."
#
# Custom domain: free `<service>.onrender.com` subdomain by default;
# add a custom domain via Settings UI after first deploy works.

services:
  - type: web
    name: wired4signs-app
    runtime: python
    plan: standard          # 2GB RAM — plenty for ABC engine + sync loop.
    region: ohio            # Closest to Florida; change if you prefer.
    branch: main            # Deploy from main on push.
    autoDeploy: true        # Auto-deploy on git push (toggle off later if you want).
    rootDir: .
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: ./start.sh
    healthCheckPath: /_stcore/health
    disk:
      name: w4s-data
      mountPath: /data
      sizeGB: 5
    envVars:
      # Where data lives — must match the disk mountPath above.
      - key: DATA_DIR
        value: /data
      # Display timestamps in this timezone everywhere in the app
      # (Last-sync indicator, audit log, "Today" / MTD slices etc).
      # Render servers run UTC by default; set this to your business
      # timezone so wall-clock times line up.
      - key: TZ
        value: America/New_York
      # Streamlit prefs: bind to Render's $PORT in headless mode.
      # CORS + XSRF use the Streamlit defaults (both true) — disabling
      # CORS while keeping XSRF on is incompatible and produces a noisy
      # warning, so we just take the defaults.
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
      # Persisted-cache home on the disk so caches survive restarts.
      - key: STREAMLIT_HOME
        value: /data/.streamlit
      # Sync loop schedule.
      # SYNC_HOUR_UTC      — hour of day (UTC) to run the heavy daily
      #                      sync. Once per 24h.
      # NEARSYNC_INTERVAL_MIN — how often to run the lightweight near-
      #                      real-time sync (stock + last-day sales).
      #                      Critical for Ordering page accuracy during
      #                      business hours. Default 15 min.
      - key: SYNC_HOUR_UTC
        value: "2"
      - key: NEARSYNC_INTERVAL_MIN
        value: "15"
      # ---- Secrets (set in Render UI, not here) -----------------------
      - key: APP_PASSWORD
        sync: false        # Team's shared login password.
      - key: CIN7_ACCOUNT_ID
        sync: false
      - key: CIN7_APPLICATION_KEY
        sync: false
      # API throttle. CIN7's 60/min cap is SHARED across all integrations
      # on the account (IP, Shopify, etc). At 1.5s/call (40/min target)
      # we tripped 429s frequently because IP+Shopify ate the rest of
      # the budget — and each 429 costs a 60s sleep, killing throughput.
      # 2.5s/call (24/min target) avoids the cap entirely. Slower per
      # call, FASTER end-to-end. Bump back to 1.5s only if you confirm
      # other integrations are quiet (e.g. weekend overnight syncs).
      - key: CIN7_RATE_SECONDS
        value: "2.5"
      - key: CIN7_DEFAULT_LOCATION
        value: "Main Warehouse"   # Override if your CIN7 location is named differently.
      # Branding (env-driven so the app can be re-skinned without code changes).
      - key: COMPANY_NAME
        value: "Wired4Signs USA"
      - key: APP_TITLE
        value: "Cin7 Analytics — Wired4Signs"
      - key: IP_API_KEY
        sync: false        # Inventory Planner token.
      - key: IP_ACCOUNT
        sync: false        # IP account number.
      # Anthropic Claude API key for the AI Assistant page. Without
      # this set, the AI Assistant page shows a "key not configured"
      # message but the rest of the app keeps working.
      - key: ANTHROPIC_API_KEY
        sync: false
